name: Welcome
description: Welcome new contributors

on:
  pull_request:
    types: [opened]
  issues:
    types: [opened]

jobs:
  welcome:
    name: Welcome
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/github-script@v4
        with:
          script: |
            const { issue, repo, actor } = context;
            const isPR = !!issue.pull_request;

            const welcomeMessage = isPR
              ? `Welcome @${actor}! Thanks for opening this pull request.`
              : `Welcome @${actor}! Thanks for opening this issue.`;

            if (issue.body && issue.body.length > 0) {
              await github.rest.issues.createComment({
                owner: repo.owner,
                repo: repo.repo,
                issue_number: issue.number,
                body: welcomeMessage
              });
            }
