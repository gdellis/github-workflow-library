name: Secret Scanning
description: Enable and run GitHub secret scanning

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run GitHub Advanced Security secret scanning
        uses: github/advanced-security-secret-scanning@v4
        with:
          category: secret_scanning
