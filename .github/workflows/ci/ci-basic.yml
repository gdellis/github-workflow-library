name: CI Basic
description: Basic CI workflow - lint, typecheck, and test

on:
  workflow_call:
    inputs:
      python-version:
        type: string
        default: '3.13'
        description: Python version to use
      lint-command:
        type: string
        default: 'uv run ruff check .'
        description: Linting command
      typecheck-command:
        type: string
        default: 'uv run ty check .'
        description: Type checking command
      test-command:
        type: string
        default: 'uv run pytest -q'
        description: Test command

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@<COMMIT_SHA>

      - name: Install uv
        uses: astral-sh/setup-uv@<COMMIT_SHA>

      - name: Set up Python
        run: uv python install ${{ inputs.python-version }}

      - name: Install dependencies
        run: uv sync --frozen --no-dev

      - name: Lint
        run: ${{ inputs.lint-command }}

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@<COMMIT_SHA>

      - name: Install uv
        uses: astral-sh/setup-uv@<COMMIT_SHA>

      - name: Set up Python
        run: uv python install ${{ inputs.python-version }}

      - name: Install dependencies
        run: uv sync --frozen --no-dev

      - name: Typecheck
        run: ${{ inputs.typecheck-command }}

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@<COMMIT_SHA>

      - name: Install uv
        uses: astral-sh/setup-uv@<COMMIT_SHA>

      - name: Set up Python
        run: uv python install ${{ inputs.python-version }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Test
        run: ${{ inputs.test-command }}
