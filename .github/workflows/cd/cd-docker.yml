name: CD Docker
description: Build and publish Docker image

on:
  workflow_call:
    inputs:
      image-name:
        type: string
        required: true
        description: Docker image name (e.g., ghcr.io/owner/image)
      dockerfile:
        type: string
        default: 'Dockerfile'
      context:
        type: string
        default: '.'
      platforms:
        type: string
        default: 'linux/amd64,linux/arm64'
      tags:
        type: string
        default: 'type=semver,pattern={{version}},type=raw,value=latest'
    secrets:
      DOCKER_USERNAME:
        required: false
      DOCKER_PASSWORD:
        required: false

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@<COMMIT_SHA>

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@<COMMIT_SHA>

      - name: Login to Container Registry
        if: secrets.DOCKER_USERNAME != ''
        uses: docker/login-action@<COMMIT_SHA>
        with:
          registry: ghcr.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to Docker Hub
        if: secrets.DOCKER_USERNAME != '' && startsWith(inputs.image-name, 'docker.io/')
        uses: docker/login-action@<COMMIT_SHA>
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@<COMMIT_SHA>
        with:
          images: ${{ inputs.image-name }}
          tags: ${{ inputs.tags }}

      - name: Build and push
        uses: docker/build-push-action@<COMMIT_SHA>
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
