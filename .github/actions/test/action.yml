name: Test
description: Run tests with uv

inputs:
  test-command:
    type: string
    default: 'uv run pytest -q'
  python-version:
    type: string
    default: '3.13'

runs:
  using: composite
  steps:
    - uses: actions/checkout@<COMMIT_SHA>

    - name: Install uv
      uses: astral-sh/setup-uv@<COMMIT_SHA>

    - name: Set up Python
      run: uv python install ${{ inputs.python-version }}

    - name: Install dependencies
      run: uv sync --frozen

    - name: Run tests
      shell: bash
      run: ${{ inputs.test-command }}
