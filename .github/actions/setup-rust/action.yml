name: Setup Rust
description: Setup Rust with caching

inputs:
  rust-version:
    type: string
    default: 'stable'

outputs:
  cache-hit:
    description: Whether cache was restored
    value: ${{ steps.cache.outputs.cache-hit }}

runs:
  using: composite
  steps:
    - uses: actions/checkout@<COMMIT_SHA>

    - name: Install Rust
      uses: dtolnay/rust-toolchain@<COMMIT_SHA>
      with:
        toolchain: ${{ inputs.rust-version }}

    - name: Cache Cargo
      uses: Swatinem/rust-cache@<COMMIT_SHA>
      with:
        shared-key: ${{ runner.os }}-${{ inputs.rust-version }}
