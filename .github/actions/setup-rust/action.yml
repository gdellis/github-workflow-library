name: Setup Rust
description: Setup Rust with caching

inputs:
  rust-version:
    type: string
    default: 'stable'

outputs:
  cache-hit:
    description: Whether cache was restored
    value: ${{ steps.cache.outputs.cache-hit }}

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Cargo
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: ${{ runner.os }}-${{ inputs.rust-version }}
