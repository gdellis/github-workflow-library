name: Lint
description: Run linting with uv

inputs:
  lint-command:
    type: string
    default: 'uv run ruff check .'
  python-version:
    type: string
    default: '3.13'

runs:
  using: composite
  steps:
    - uses: actions/checkout@<COMMIT_SHA>

    - name: Install uv
      uses: astral-sh/setup-uv@<COMMIT_SHA>

    - name: Set up Python
      run: uv python install ${{ inputs.python-version }}

    - name: Install dependencies
      run: uv sync --frozen --no-dev

    - name: Run linter
      shell: bash
      run: ${{ inputs.lint-command }}
